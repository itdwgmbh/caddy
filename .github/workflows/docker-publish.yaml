name: Docker Build

on:
  schedule:
    - cron: '21 12 15 * *'  # Monthly on the 15th at 12:21 UTC
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

env:
  REGISTRY: ${{ secrets.ITDW_CONTAINER_REGISTRY_SERVER }}
  IMAGE_NAME: "library/caddy"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:          
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.0.0

      - name: Set up QEMU for multi-platform builds
        uses: docker/setup-qemu-action@v3

      - name: Log into private registry ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ITDW_CONTAINER_REGISTRY_USER }}
          password: ${{ secrets.ITDW_CONTAINER_REGISTRY_PASSWORD }}

      - name: Log into GitHub Container Registry (for base images)
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image to extract version
        id: build-for-version
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: caddy-version-check:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Extract Caddy version
        id: version
        run: |
          CADDY_VERSION=$(docker run --rm caddy-version-check:latest /usr/bin/caddy version | cut -d' ' -f1)
          echo "CADDY_VERSION=${CADDY_VERSION}" >> $GITHUB_OUTPUT
          echo "Caddy version: ${CADDY_VERSION}"

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.version.outputs.CADDY_VERSION }}
            type=sha,format=short,prefix=

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64