name: Build and Upload Caddy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: '27 3 1 * *' # Adjust this to a preferred random time if needed

env:
  TEMP_DIR: ${{ github.workspace }}/caddy
  CADDY_VERSION: latest
  XCADDY_SUDO: 0

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goarch: [amd64, arm64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: 1.22

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl jq zip

      - name: Install xcaddy
        run: go install github.com/caddyserver/xcaddy/cmd/xcaddy@latest

      - name: Build Caddy
        run: |
          mkdir -p ${{ env.TEMP_DIR }}
          GOARCH=${{ matrix.goarch }} xcaddy build \
            --with github.com/caddy-dns/infomaniak \
            --with github.com/caddy-dns/azure \
            --with github.com/caddy-dns/bunny \
            --with github.com/digilolnet/caddy-bunny-ip \
            --with github.com/caddy-dns/hetzner \
            --output ${{ env.TEMP_DIR }}/caddy-${{ matrix.goarch }}

      - name: Archive Caddy
        run: zip -9 ${{ env.TEMP_DIR }}/caddy-${{ matrix.goarch }}.zip ${{ env.TEMP_DIR }}/caddy-${{ matrix.goarch }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: caddy-${{ matrix.goarch }}
          path: ${{ env.TEMP_DIR }}/caddy-${{ matrix.goarch }}.zip

  mirror:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download AMD64 build artifact
        uses: actions/download-artifact@v4
        with:
          name: caddy-amd64
          path: ${{ env.TEMP_DIR }}

      - name: Download ARM64 build artifact
        uses: actions/download-artifact@v4
        with:
          name: caddy-arm64
          path: ${{ env.TEMP_DIR }}

      - name: Configure rclone
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          mkdir -p $HOME/.config/rclone
          echo "[gos3]" > $HOME/.config/rclone/rclone.conf
          echo "type = s3" >> $HOME/.config/rclone/rclone.conf
          echo "provider = Other" >> $HOME/.config/rclone/rclone.conf
          echo "access_key_id = $HOME/.config/rclone/rclone.conf
          echo "secret_access_key = $HOME/.config/rclone/rclone.conf
          echo "endpoint = https://gos3.io" >> $HOME/.config/rclone/rclone.conf

      - name: Install rclone
        run: curl https://rclone.org/install.sh | sudo bash

      - name: Sync AMD64 to S3
        run: |
          rclone sync ${{ env.TEMP_DIR }}/caddy-amd64.zip gos3:itdw-artifacts/caddy-amd64 -v --config ${{ env.RCLONE_CONFIG_PATH }}

      - name: Sync ARM64 to S3
        run: |
          rclone sync ${{ env.TEMP_DIR }}/caddy-arm64.zip gos3:itdw-artifacts/caddy-arm64 -v --config ${{ env.RCLONE_CONFIG_PATH }}
