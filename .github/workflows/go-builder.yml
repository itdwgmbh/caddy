name: Build Caddy with Plugins

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    # Run on the first day of each month at 00:00 UTC
    - cron: '0 0 1 * *'

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
      date: ${{ steps.get-date.outputs.date }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: 'stable'
        check-latest: true

    - name: Install xcaddy
      run: |
        go install github.com/caddyserver/xcaddy/cmd/xcaddy@latest

    - name: Build Caddy with plugins
      run: |
        xcaddy build \
          --with github.com/digilolnet/caddy-bunny-ip \
          --output ./caddy

    - name: Get current date
      id: get-date
      run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

    - name: Install FPM
      run: |
        sudo apt-get update
        sudo apt-get install -y ruby ruby-dev build-essential
        sudo gem install fpm

    - name: Create DEB package
      id: get-version
      run: |
        # Get Caddy version from the built binary
        CADDY_VERSION=$(./caddy version | grep -oP 'v\d+\.\d+\.\d+' | head -1)
        # Remove 'v' prefix if present
        VERSION="${CADDY_VERSION#v}"

        # Save version for later use
        echo "version=${VERSION}" >> $GITHUB_OUTPUT

        # Create directories for packaging
        mkdir -p ./deb/usr/bin
        mkdir -p ./deb/etc/caddy
        mkdir -p ./deb/etc/systemd/system
        mkdir -p ./deb/usr/share/doc/caddy
        mkdir -p ./deb/var/log/caddy

        # Copy binary and configuration
        cp ./caddy ./deb/usr/bin/
        cp ./Caddyfile ./deb/etc/caddy/Caddyfile

        # Build DEB package
        fpm -s dir -t deb \
          -n caddy \
          -v "${VERSION}" \
          --vendor "Caddy Web Server" \
          --maintainer "Caddy Builder <github-actions@example.com>" \
          --description "Caddy Web Server with plugins" \
          --url "https://caddyserver.com" \
          --license "Apache-2.0" \
          --depends "ca-certificates" \
          --config-files /etc/caddy/Caddyfile \
          --deb-systemd ./caddy.service \
          --after-install ./postinst \
          --before-remove ./prerm.sh \
          --after-remove ./postrm \
          -C ./deb \
          -p caddy.deb

    - name: Upload DEB package
      uses: actions/upload-artifact@v4
      with:
        name: caddy-custom
        path: caddy.deb
        retention-days: 30

  publish-pages:
    needs: build
    runs-on: ubuntu-latest
    # Only run on main branch pushes and scheduled runs
    if: github.ref == 'refs/heads/main' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download built DEB package
      uses: actions/download-artifact@v4
      with:
        name: caddy-custom
        path: ./dist

    - name: Setup Pages
      uses: actions/configure-pages@v5

    - name: Create website content
      run: |
        mkdir -p _site

        # Version and date from build job
        VERSION="${{ needs.build.outputs.version }}"
        BUILD_DATE="${{ needs.build.outputs.date }}"
        DEB_FILE=./dist/caddy.deb
        DEB_FILENAME=caddy.deb

        # Copy DEB file to site directory
        cp "$DEB_FILE" _site/

        # Create index.html from template
        sed "s/\$VERSION/$VERSION/g; s/\$BUILD_DATE/$BUILD_DATE/g; s|\$DEB_FILENAME|$DEB_FILENAME|g" _site/index.html.template > _site/index.html

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
