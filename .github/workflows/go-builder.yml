name: Build and Upload Caddy

on:
  push:
    branches:
      - main
  schedule:
    - cron: '28 3 1 * *' # Adjust this to a preferred random time if needed
  workflow_dispatch:

env:
  RCLONE_DIR: /home/runner/.config/rclone
  RCLONE_CONF: /home/runner/.config/rclone/rclone.conf
  TEMP_DIR: /home/runner/work/_temp
  CADDY_VERSION: latest
  GO_VERSION: 1.22
  XCADDY_SUDO: 0

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goarch: [amd64, arm64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl jq zip

      - name: Install xcaddy
        run: go install github.com/caddyserver/xcaddy/cmd/xcaddy@latest

      - name: Build Caddy
        run: |
          mkdir -p ${{ env.TEMP_DIR }}
          GOARCH=${{ matrix.goarch }} xcaddy build \
            --with github.com/caddy-dns/infomaniak \
            --with github.com/caddy-dns/azure \
            --with github.com/caddy-dns/bunny \
            --with github.com/digilolnet/caddy-bunny-ip \
            --with github.com/caddy-dns/hetzner \
            --output ${{ env.TEMP_DIR }}/caddy-${{ matrix.goarch }}

      - name: Repackage Caddy amd64
        if: matrix.goarch == 'amd64'
        run: |
          cd ${{ env.TEMP_DIR }}
          zip -9 caddy_linux_amd64.zip caddy-amd64

      - name: Repackage Caddy arm64
        if: matrix.goarch == 'arm64'
        run: |
          cd ${{ env.TEMP_DIR }}
          zip -9 caddy_linux_arm64.zip caddy-arm64

  mirror:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Configure rclone
        run: |
          mkdir -p ${{ env.RCLONE_DIR }}
          echo "[gos3]" > ${{ env.RCLONE_CONF }}
          echo "type = s3" >> ${{ env.RCLONE_CONF }}
          echo "provider = Other" >> ${{ env.RCLONE_CONF }}
          echo "access_key_id = ${{ secrets.AWS_ACCESS_KEY_ID }}" >> ${{ env.RCLONE_CONF }}
          echo "secret_access_key = ${{ secrets.AWS_SECRET_ACCESS_KEY }}" >> ${{ env.RCLONE_CONF }}
          echo "endpoint = https://gos3.io" >> ${{ env.RCLONE_CONF }}

      - name: Install rclone
        run: curl https://rclone.org/install.sh | sudo bash

      - name: Sync Caddy artifacts to S3
        run: |
          rclone sync ${{ env.TEMP_DIR }}/ gos3:itdw-artifacts/caddy -v --config ${{ env.RCLONE_CONF }} --include "caddy_linux_*.zip"

      - name: Create release.txt
        run: |
          echo "Caddy version: ${{ env.CADDY_VERSION }}" > ${{ env.TEMP_DIR }}/release.txt
          echo "Last updated: $(date -u +'%Y-%m-%d')" >> ${{ env.TEMP_DIR }}/release.txt

      - name: Sync release information to S3
        run: |
          rclone sync ${{ env.TEMP_DIR }}/release.txt gos3:itdw-artifacts/caddy -v --config ${{ env.RCLONE_CONF }}

      - name: Send POST request with release.txt content
        run: |
          curl -X POST https://hc.itdw.io/ping/bf3e2777-2707-4bf0-b22f-d13af430e8c3 \
            -H "Content-Type: text/plain" \
            --data-binary @$${{ env.TEMP_DIR }}/release.txt
