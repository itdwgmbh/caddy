name: Build and Upload Caddy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: '27 3 1 * *' # Adjust this to a preferred random time if needed

env:
  TEMP_DIR: ${{ github.workspace }}/tmp/caddy
  RCLONE_CONFIG_PATH: /root/.config/rclone/rclone.conf
  CADDY_VERSION: latest
  XCADDY_SUDO: 0

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl jq zip

      - name: Install xcaddy
        run: go install github.com/caddyserver/xcaddy/cmd/xcaddy@latest

      - name: Build Caddy
        run: |
          mkdir -p ${{ env.TEMP_DIR }}
          xcaddy build \
            --with github.com/caddy-dns/cloudflare \
            --with github.com/caddy-dns/infomaniak \
            --with github.com/caddy-dns/azure \
            --with github.com/caddy-dns/bunny \
            --with github.com/digilolnet/caddy-bunny-ip \
            --with github.com/caddy-dns/hetzner \
            --output ${{ env.TEMP_DIR }}/caddy

      - name: Archive Caddy
        run: zip -9 ${{ env.TEMP_DIR }}/caddy.zip ${{ env.TEMP_DIR }}/caddy

      - name: Upload build artifact
        uses: actions/upload-artifact@v3
        with:
          name: caddy
          path: ${{ env.TEMP_DIR }}/caddy.zip

  mirror:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v3
        with:
          name: caddy
