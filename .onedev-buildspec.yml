version: 43
jobs:
- name: Build Docker Image
  steps:
  - type: BuildImageStep
    name: Build Caddy Image
    output:
      type: RegistryOutput
      tags: '@server@/@project_path@/caddy:latest'
    condition: SUCCESSFUL
    optional: false
  retryCondition: never
  maxRetries: 3
  retryDelay: 30
  timeout: 14400
