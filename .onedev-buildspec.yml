version: 43
jobs:
- name: Build Docker Image
  steps:
  - type: CheckoutStep
    name: Checkout Code
    cloneCredential:
      type: DefaultCredential
    withLfs: false
    withSubmodules: false
    condition: SUCCESSFUL
    optional: false
  - type: BuildImageStep
    name: Build Caddy Image
    output:
      type: RegistryOutput
      tags: '@server@/@project_path@/caddy:latest'
    platforms: linux/amd64,linux/arm64
    condition: SUCCESSFUL
    optional: false
  retryCondition: never
  maxRetries: 3
  retryDelay: 30
  timeout: 14400
